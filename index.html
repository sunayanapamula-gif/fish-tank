<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Magical Water Tank</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Control Buttons -->
  <div class="controls">
    <button id="resetBtn">Reset</button>
    <button id="schoolBtn">Schooling Mode</button>
    <button id="playBtn">Play Water Sound</button>
    <button id="pauseBtn">Pause Water Sound</button>
    <button id="toggleThemeBtn">Toggle Day/Night</button>
  </div>

  <!-- Aquarium Container -->
  <div id="waterTank">
    <div id="plantsContainer"></div>
    <div id="coralContainer"></div>
    <div id="houseContainer"></div>
    <div id="fishContainer"></div>
    <div id="bubbleContainer"></div>
    <div id="jellyfishContainer"></div>
    <div id="tortoiseContainer"></div>
    <div id="starfishContainer"></div>
    <div id="crabContainer"></div>
    <div id="neonFishContainer"></div>
    <div id="sharkContainer"></div> <!-- Shark container -->
  </div>

  <!-- Continuous Water Sound -->
  <audio id="waterSound" autoplay loop>
    <source src="549334__kapilkant__soft-ocean-waves-sounds.m4a" type="audio/m4a">
    <!-- Fallback text for unsupported browsers -->
    Your browser does not support the audio element.
  </audio>

  <!-- Aquarium Logic -->
  <script src="script.js"></script>

  <!-- Theme Toggle Logic -->
  <script>
    const toggleBtn = document.getElementById("toggleThemeBtn");
    const waterTank = document.getElementById("waterTank");

    let isNight = true; // default to night mode

    toggleBtn.addEventListener("click", () => {
      if (isNight) {
        // Switch to Day Mode
        waterTank.style.background = "linear-gradient(to bottom, #0099ff, #003366)";
        document.querySelectorAll(".fish .body").forEach(f => f.style.boxShadow = "none");
        document.querySelectorAll(".plant").forEach(p => p.style.boxShadow = "none");
        document.querySelectorAll(".jellyfish").forEach(j => j.style.boxShadow = "0 0 20px rgba(173,216,230,0.9)");
        isNight = false;
      } else {
        // Switch back to Night Mode
        waterTank.style.background = "linear-gradient(to bottom, #001a33, #000000)";
        document.querySelectorAll(".fish .body").forEach(f => f.style.boxShadow = "0 0 25px rgba(255,255,255,1)");
        document.querySelectorAll(".plant").forEach(p => p.style.boxShadow = "0 0 15px rgba(0,255,150,0.7)");
        document.querySelectorAll(".jellyfish").forEach(j => j.style.boxShadow = "0 0 40px rgba(0,200,255,1), 0 0 80px rgba(0,200,255,0.7)");
        isNight = true;
      }
    });
  </script>
</body>
</html>
