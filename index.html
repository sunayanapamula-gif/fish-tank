<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Magical Water Tank</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Control Buttons -->
  <div class="controls">
    <button id="resetBtn">Reset</button>
    <button id="schoolBtn">Schooling Mode</button>
    <button id="playBtn">Play Water Sound</button>
    <button id="pauseBtn">Pause Water Sound</button>
    <button id="toggleThemeBtn">Toggle Day/Night</button>
  </div>

  <!-- Aquarium Container -->
  <div id="waterTank">
    <div id="plantsContainer"></div>
    <div id="coralContainer"></div>
    <div id="houseContainer"></div>
    <div id="fishContainer"></div>
    <div id="bubbleContainer"></div>
    <div id="jellyfishContainer"></div>
    <div id="tortoiseContainer"></div>
    <div id="starfishContainer"></div>
    <div id="crabContainer"></div>
    <div id="neonFishContainer"></div>
    <div id="sharkContainer"></div>
  </div>

  <!-- Continuous Water Sound -->
  <audio id="waterSound" loop>
    <source src="549334__kapilkant__soft-ocean-waves-sounds.m4a" type="audio/m4a">
    Your browser does not support the audio element.
  </audio>

  <!-- Aquarium Logic -->
  <script src="script.js"></script>
</body>
</html>
